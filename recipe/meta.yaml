{% set name = "delve" %}
{% set version = "1.25.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/go-delve/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: dda9adaafefa469662846d49a82cb7053605bce90bf2986d3f31be6929440ed0

build:
  number: 0

requirements:
  build:
    - {{ compiler('go-nocgo') }}
    - go-licenses

test:
  commands:
    - dlv --help

about:
  home: https://github.com/go-delve/{{ name }}
  license: MIT
  license_file:
    - LICENSE
    - license-files/
  summary: Debugger for the Go programming language
  dev_url: https://github.com/go-delve/{{ name }}

extra:
  recipe-maintainers:
    - danielnachun
