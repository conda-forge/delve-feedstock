schema_version: 1

context:
  version: "1.26.0"

package:
  name: delve
  version: ${{ version }}

source:
  url: https://github.com/go-delve/delve/archive/v${{ version }}.tar.gz
  sha256: 80c69d5bbfd80350fdf2022395877c013d14397f099c729b9f44b94d62d127ea

build:
  number: 0

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - dlv --help

about:
  license: MIT
  license_file:
    - LICENSE
    - license-files/
  summary: Debugger for the Go programming language
  homepage: https://github.com/go-delve/delve
  repository: https://github.com/go-delve/delve

extra:
  recipe-maintainers:
    - danielnachun
